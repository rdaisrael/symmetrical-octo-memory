<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Penina 2.6.2</title>
    <style>
        /* --- EMBEDDED DYSLEXIC FONT --- */
        @font-face {
            font-family: 'Dyslexic-Kriah';
            src: url('Dyslexic-Kriah.otf') format('opentype');
            font-weight: normal;
            font-style: normal;
        }

        body { font-family: Arial, sans-serif; padding: 20px; max-width: 900px; margin: auto; background-color: #f0f4f8; }
        
        h1 { text-align: center; color: #333; margin-bottom: 5px; }
        .copyright { text-align: center; font-style: italic; font-size: 14px; color: #555; margin-bottom: 25px; }
        
        .control-panel { background: white; padding: 25px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .form-group { margin-bottom: 20px; }
        label { font-weight: bold; display: block; margin-bottom: 8px; color: #444; }
        .checkbox-group label { display: inline-flex; align-items: center; margin-right: 20px; font-weight: normal; cursor: pointer; gap: 5px; }
        
        select, textarea, input[type="text"] { font-family: inherit; width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; font-size: 16px; }
        textarea, input[type="text"].hebrew-input { direction: rtl; font-size: 18px; }
        
        /* --- SLIDERS --- */
        .slider-group { display: flex; gap: 20px; margin-bottom: 20px; }
        .slider-container { flex: 1; }
        .slider-container input[type="range"] { width: 100%; cursor: pointer; }

        /* --- COLOR KEY DROPDOWN STYLES --- */
        details.color-key-details { background: #fafafa; border: 1px solid #ccc; border-radius: 5px; padding: 10px 15px; margin-bottom: 20px; }
        summary.color-key-summary { font-weight: bold; font-size: 16px; cursor: pointer; color: #0056b3; outline: none; list-style-position: inside; }
        summary.color-key-summary:hover { color: #003d82; }

        .vowel-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-top: 15px; }
        .vowel-item { display: flex; align-items: center; justify-content: space-between; font-size: 16px; background: white; padding: 8px 12px; border: 1px solid #ddd; border-radius: 5px;}
        .vowel-item input[type="color"] { cursor: pointer; border: none; width: 40px; height: 30px; padding: 0; }
        .vowel-label { display: flex; align-items: center; gap: 10px; font-weight: normal; cursor: pointer; margin-bottom: 0; }
        .vowel-text { font-weight: bold; text-shadow: 0px 0px 1px rgba(0,0,0,0.2); }

        .button-group { text-align: center; margin-top: 20px; }
        button { padding: 12px 25px; font-size: 16px; cursor: pointer; margin: 0 10px; border: none; border-radius: 5px; font-weight: bold; color: white; }
        #generate-btn { background-color: #0056b3; }
        #print-btn { background-color: #28a745; }
        
        /* --- THE STACK & GRID CSS --- */
        .heb-word {
            display: inline-flex;
            direction: rtl;
            unicode-bidi: isolate;
            white-space: nowrap; 
        }
        .heb-cluster {
            display: inline-grid;
            place-items: center;
            -webkit-font-smoothing: antialiased;
            line-height: 1; 
        }
        .layer-bottom, .layer-top { grid-area: 1 / 1; }
        .layer-top { color: black; pointer-events: none; z-index: 2; }
        .layer-bottom { z-index: 1; }

        /* --- STRUCTURAL ELEMENTS (EXCLUDED FROM KERNING) --- */
        .line-number {
            letter-spacing: normal !important;
        }

        .penina-footer {
            display: block; width: 100%; text-align: center;
            font-family: Arial, sans-serif; font-size: 12px; color: #666;
            margin-top: 60px; direction: ltr;
            letter-spacing: normal !important;
        }

        /* --- GLOBAL RTL DIRECTION --- */
        #story-output {
            direction: rtl;
            text-align: right;
        }

        /* --- WYSIWYG VIRTUAL PAPER LOCK --- */
        @media screen {
            #story-output {
                background-color: white;
                width: 8.5in;              
                max-width: 100%;          
                min-height: 11in;         
                margin: 20px auto;
                box-shadow: 0 4px 15px rgba(0,0,0,0.1);
                box-sizing: border-box;
            }
        }

        @media print {
            body { background: white; }
            .control-panel, h1, .copyright { display: none; } 
            
            #story-output {
                width: 100% !important;   
                margin: 0 !important;
                padding: 0 !important;    
                border: none;
                box-shadow: none;
            }
        }
    </style>
</head>
<body>

    <h1>Penina 2.6.2</h1>
    <div class="copyright">&copy; 2026 David Israel</div>

    <div class="control-panel">
        
        <div class="form-group">
            <label for="theme">1. נושא הסיפור (Story Prompt/Topic):</label>
            <textarea id="theme" rows="2" placeholder="Tell the AI what the story should be about (English or Hebrew)..."></textarea>
        </div>

        <div class="form-group">
            <label for="target-input">2. מילות מטרה (Target Words to Highlight - Optional):</label>
            <textarea id="target-input" class="hebrew-input" rows="2" placeholder="Type words separated by commas/newlines (English or Hebrew)..."></textarea>
        </div>

        <div class="form-group">
            <label for="reading-level">3. רמת קריאה (Reading Level):</label>
            <select id="reading-level">
                <option value="beginner">Beginner (Easy vocabulary, short sentences)</option>
                <option value="intermediate" selected>Intermediate (Standard modern Hebrew)</option>
                <option value="advanced">Advanced (Sophisticated vocabulary, complex sentences)</option>
            </select>
        </div>

        <div class="form-group checkbox-group" style="background: #f8f9fa; padding: 15px; border-radius: 5px; border: 1px solid #ddd;">
            <label style="font-weight: bold; display: block; margin-bottom: 5px; width: 100%;">Target Word Styling & Layout Options:</label>
            <label><input type="checkbox" id="bold-words"> Bold Target Words</label>
            <label>
                <input type="checkbox" id="highlight-words"> Color Target Words:
                <input type="color" id="target-color" value="#1E90FF" style="border:none; width:30px; height:25px; cursor:pointer; padding:0; margin-left:5px;">
            </label>
            <label><input type="checkbox" id="show-line-numbers"> Show Line Numbers</label>
        </div>

        <div class="slider-group">
            <div class="slider-container">
                <label for="font-size">Font Size: <span id="font-size-val">38px</span></label>
                <input type="range" id="font-size" min="20" max="80" value="38">
            </div>
            <div class="slider-container">
                <label for="kerning">Letter Spacing (Kerning): <span id="kerning-val">0px</span></label>
                <input type="range" id="kerning" min="0" max="20" value="0">
            </div>
        </div>

        <div class="form-group" style="display: flex; gap: 20px;">
            <div style="flex: 1;">
                <label for="length">Story Length:</label>
                <select id="length">
                    <option value="3-paragraph">Short (3 Paragraphs)</option>
                    <option value="1-page">Medium (1 Page)</option>
                    <option value="2-page">Long (2 Pages)</option>
                    <option value="custom">Other (Specify)</option>
                </select>
                <input type="text" id="custom-length" placeholder="e.g. 5 pages" style="display: none; margin-top: 10px;">
            </div>
            <div style="flex: 1;">
                <label for="font-choice">Choose Font:</label>
                <select id="font-choice">
                    <option value="Arial, sans-serif">Arial (Modern)</option>
                    <option value="'David', serif">David (Classic Book Style)</option>
                    <option value="'Dyslexic-Kriah', 'Alef', sans-serif">Dyslexia-Friendly (Dyslexic-Kriah)</option>
                </select>
            </div>
            <div style="flex: 1;">
                <label for="margin-choice">3-Hole Punch Binding:</label>
                <select id="margin-choice">
                    <option value="none">No extra margin (Standard)</option>
                    <option value="right">Right Side (Hebrew standard)</option>
                    <option value="left">Left Side (English standard)</option>
                    <option value="alternate-right">Alternating (Starts Right)</option>
                    <option value="alternate-left">Alternating (Starts Left)</option>
                </select>
            </div>
        </div>

        <div class="form-group">
            <details class="color-key-details">
                <summary class="color-key-summary">🎨 Nikkud (Vowel) Color Settings (Click to Open)</summary>
                
                <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 10px; flex-wrap: wrap; gap: 10px;">
                    <p style="margin: 0; font-size: 14px; color: #666; font-style: italic;">Check a box to apply color. Uncheck to leave that vowel the default black color.</p>
                    <div style="flex-shrink: 0;">
                        <button type="button" id="select-all-btn" style="padding: 6px 12px; font-size: 13px; margin-right: 5px; background-color: #6c757d; color: white; border: none; border-radius: 4px; cursor: pointer;">Select All</button>
                        <button type="button" id="unselect-all-btn" style="padding: 6px 12px; font-size: 13px; background-color: #6c757d; color: white; border: none; border-radius: 4px; cursor: pointer;">Unselect All</button>
                    </div>
                </div>

                <div class="vowel-grid">
                    <div class="vowel-item">
                        <label class="vowel-label"><input type="checkbox" id="en-kamatz"> <span class="vowel-text" id="text-kamatz">Aqua (Kamatz)</span></label>
                        <input type="color" id="col-kamatz" value="#1E90FF">
                    </div>
                    <div class="vowel-item">
                        <label class="vowel-label"><input type="checkbox" id="en-kamatz-katan"> <span class="vowel-text" id="text-kamatz-katan">AUburn (Kamatz Katan)</span></label>
                        <input type="color" id="col-kamatz-katan" value="#A52A2A">
                    </div>
                    <div class="vowel-item">
                        <label class="vowel-label"><input type="checkbox" id="en-patach"> <span class="vowel-text" id="text-patach">Aqua (Patach)</span></label>
                        <input type="color" id="col-patach" value="#1E90FF">
                    </div>
                    <div class="vowel-item">
                        <label class="vowel-label"><input type="checkbox" id="en-segol"> <span class="vowel-text" id="text-segol">rEd (Segol)</span></label>
                        <input type="color" id="col-segol" value="#FF0000">
                    </div>
                    <div class="vowel-item">
                        <label class="vowel-label"><input type="checkbox" id="en-tzere-chaser"> <span class="vowel-text" id="text-tzere-chaser">rEd (Tzere Chaser)</span></label>
                        <input type="color" id="col-tzere-chaser" value="#FF0000">
                    </div>
                    <div class="vowel-item">
                        <label class="vowel-label"><input type="checkbox" id="en-tzere-maleh"> <span class="vowel-text" id="text-tzere-maleh">Acorn (Tzere Maleh)</span></label>
                        <input type="color" id="col-tzere-maleh" value="#8B4513">
                    </div>
                    <div class="vowel-item">
                        <label class="vowel-label"><input type="checkbox" id="en-chirik"> <span class="vowel-text" id="text-chirik">grEEn (Chirik)</span></label>
                        <input type="color" id="col-chirik" value="#008000">
                    </div>
                    <div class="vowel-item">
                        <label class="vowel-label"><input type="checkbox" id="en-cholam"> <span class="vowel-text" id="text-cholam">Orange (Cholam)</span></label>
                        <input type="color" id="col-cholam" value="#FFA500">
                    </div>
                    <div class="vowel-item">
                        <label class="vowel-label"><input type="checkbox" id="en-shuruk"> <span class="vowel-text" id="text-shuruk">blUE (Shuruk)</span></label>
                        <input type="color" id="col-shuruk" value="#0000FF">
                    </div>
                    <div class="vowel-item">
                        <label class="vowel-label"><input type="checkbox" id="en-kubutz"> <span class="vowel-text" id="text-kubutz">blUE (Kubutz)</span></label>
                        <input type="color" id="col-kubutz" value="#0000FF">
                    </div>
                    <div class="vowel-item">
                        <label class="vowel-label"><input type="checkbox" id="en-shva-nach"> <span class="vowel-text" id="text-shva-nach">Silent (Shva Nach)</span></label>
                        <input type="color" id="col-shva-nach" value="#9E9E9E">
                    </div>
                    <div class="vowel-item">
                        <label class="vowel-label"><input type="checkbox" id="en-shva-na"> <span class="vowel-text" id="text-shva-na">Indigo (Shva Na)</span></label>
                        <input type="color" id="col-shva-na" value="#8b1ddb">
                    </div>
                </div>
            </details>
        </div>

        <div class="button-group">
            <button id="generate-btn">Generate / Regenerate Story</button>
            <button id="print-btn" onclick="window.print()">Print Story</button>
        </div>
    </div>

    <div id="story-output" dir="rtl">
        הַסִּפּוּר שֶׁלְּךָ יָכִיל מִלִּים צִבְעוֹנִיּוֹת בְּקָרוֹב!
    </div>

    <script>
        // ==========================================
        //               PENINA 2.6.2
        // ==========================================
        
        let currentRawStory = ""; 

        function syncUIColors() {
            const vowelIds = ['kamatz', 'kamatz-katan', 'patach', 'segol', 'tzere-chaser', 'tzere-maleh', 'chirik', 'cholam', 'shuruk', 'kubutz', 'shva-nach', 'shva-na'];
            vowelIds.forEach(id => {
                const colorValue = document.getElementById(`col-${id}`).value;
                document.getElementById(`text-${id}`).style.color = colorValue;
            });
        }
        
        const storyResizeObserver = new ResizeObserver(() => {
            updateLineNumbers();
        });

        window.addEventListener('DOMContentLoaded', () => {
            syncUIColors();
            storyResizeObserver.observe(document.getElementById('story-output'));
        });

        // Force a fresh calculation exactly when the print layout is locked in
        window.addEventListener('beforeprint', () => {
            applyStyles();
            updateLineNumbers();
        });

        document.getElementById('select-all-btn').addEventListener('click', () => {
            document.querySelectorAll('.vowel-grid input[type="checkbox"]').forEach(cb => cb.checked = true);
            syncUIColors();
            renderStoryToScreen();
        });

        document.getElementById('unselect-all-btn').addEventListener('click', () => {
            document.querySelectorAll('.vowel-grid input[type="checkbox"]').forEach(cb => cb.checked = false);
            syncUIColors();
            renderStoryToScreen();
        });

        document.getElementById('length').addEventListener('change', function() {
            const customInput = document.getElementById('custom-length');
            if (this.value === 'custom') {
                customInput.style.display = 'block';
            } else {
                customInput.style.display = 'none';
            }
        });

        // HELPER: Translation API Call mapped to Vercel Backend
        async function translateText(promptText) {
            const res = await fetch('/api/translate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ promptText: promptText })
            });
            const data = await res.json();
            if (data.error) throw new Error(data.error);
            return data.text;
        }

        document.getElementById('generate-btn').addEventListener('click', async () => {
            const outputDiv = document.getElementById('story-output');
            let currentTheme = document.getElementById('theme').value;
            let currentTargets = document.getElementById('target-input').value;
            let length = document.getElementById('length').value;
            const customLength = document.getElementById('custom-length').value;
            const readingLevel = document.getElementById('reading-level').value;
            const btn = document.getElementById('generate-btn');
            
            if (!currentTheme && !currentTargets) {
                alert("Please enter a topic or target words first!");
                return;
            }

            if (length === 'custom') {
                length = customLength || "1-page";
            }

            btn.disabled = true;

            // --- PRE-FLIGHT TRANSLATION: Check for English letters ---
            if (/[a-zA-Z]/.test(currentTheme) || /[a-zA-Z]/.test(currentTargets)) {
                btn.innerText = "Translating to Hebrew... (Please Wait)";
                try {
                    const promises = [];
                    let themeIndex = -1;
                    let targetIndex = -1;

                    if (/[a-zA-Z]/.test(currentTheme)) {
                        promises.push(translateText(`Translate this story theme/prompt into Modern Israeli Hebrew. Return ONLY the Hebrew translation, NO extra text: ${currentTheme}`));
                        themeIndex = promises.length - 1;
                    }
                    if (/[a-zA-Z]/.test(currentTargets)) {
                        promises.push(translateText(`Translate any English words in the following list into Modern Israeli Hebrew. Keep existing Hebrew words as they are. Return the full combined list of ONLY Hebrew words, separated by commas, with NO nikkud, NO english, and NO extra text: ${currentTargets}`));
                        targetIndex = promises.length - 1;
                    }

                    const results = await Promise.all(promises);

                    // Update UI textboxes so user sees the Hebrew words and highlighter logic works
                    if (themeIndex !== -1) {
                        currentTheme = results[themeIndex];
                        document.getElementById('theme').value = currentTheme;
                    }
                    if (targetIndex !== -1) {
                        currentTargets = results[targetIndex];
                        document.getElementById('target-input').value = currentTargets;
                    }
                } catch (error) {
                    console.error("Translation error:", error);
                }
            }

            btn.innerText = "Writing Story... (Please Wait)";
            outputDiv.innerHTML = "מכין את הסיפור שלך... (Generating...)";

            // --- READING LEVEL INSTRUCTIONS ---
            let levelInstruction = "";
            if (readingLevel === 'beginner') {
                levelInstruction = "CRITICAL: Write at a BEGINNER reading level. Use very simple, common Hebrew words (1-2 syllables where possible), short straightforward sentences, and basic grammar. Avoid complex structures.";
            } else if (readingLevel === 'intermediate') {
                levelInstruction = "Write at an INTERMEDIATE reading level. Use standard, everyday Modern Israeli Hebrew with moderate sentence lengths.";
            } else if (readingLevel === 'advanced') {
                levelInstruction = "CRITICAL: Write at an ADVANCED reading level. Use sophisticated, high-level Hebrew vocabulary, richer descriptions, idiomatic expressions, and complex sentence structures.";
            }

            let topicInstruction = currentTheme ? `The theme is: ${currentTheme}.` : "";
            let wordsInstruction = currentTargets ? `CRITICAL: You MUST make every attempt to prioritize and prominently use these specific target words throughout the course of the story: ${currentTargets}.` : "";

            const prompt = `Write a ${length} story in strict, everyday Modern Israeli Hebrew. Do NOT use Biblical Hebrew phrasing, archaic syntax, or vav-ha'hipuch. 
            ${levelInstruction}
            ${topicInstruction} 
            ${wordsInstruction}
            CRITICAL INSTRUCTION: Return ONLY plain Hebrew text. Do NOT include any nikkud (vowels). Do NOT include any English.
            Do NOT wrap target words in asterisks (*) or any markdown formatting. Return plain text only.
            Provide a descriptive Title for the story on the very first line.
            Ensure perfect grammar. Return ONLY the Hebrew text, nothing else.`;

            try {
                // Call the Vercel Backend
                const response = await fetch('/api/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: prompt })
                });

                const data = await response.json();
                
                if (data.error) {
                    throw new Error(data.error);
                }

                currentRawStory = data.text.replace(/\*/g, '');
                
                renderStoryToScreen();

            } catch (error) {
                console.error(error);
                // Print the specific backend error message to the screen
                outputDiv.innerHTML = `<span style="color:red; font-weight:bold;">שגיאה (Error):</span> ${error.message}`;
            } finally {
                btn.innerText = "Generate / Regenerate Story";
                btn.disabled = false;
            }
        });

        document.getElementById('margin-choice').addEventListener('change', applyStyles);
        document.getElementById('font-choice').addEventListener('change', applyStyles);
        document.getElementById('show-line-numbers').addEventListener('change', updateLineNumbers);
        
        document.getElementById('target-input').addEventListener('input', renderStoryToScreen);
        document.getElementById('bold-words').addEventListener('change', renderStoryToScreen);
        document.getElementById('highlight-words').addEventListener('change', renderStoryToScreen);
        document.getElementById('target-color').addEventListener('input', renderStoryToScreen);

        document.getElementById('font-size').addEventListener('input', (e) => {
            document.getElementById('font-size-val').innerText = e.target.value + 'px';
            applyStyles();
        });
        document.getElementById('kerning').addEventListener('input', (e) => {
            document.getElementById('kerning-val').innerText = e.target.value + 'px';
            applyStyles();
        });

        document.querySelectorAll('.vowel-grid input').forEach(input => {
            input.addEventListener('input', () => { syncUIColors(); renderStoryToScreen(); });
            input.addEventListener('change', () => { syncUIColors(); renderStoryToScreen(); });
        });

        function renderStoryToScreen() {
            if (!currentRawStory) return; 
            const outputDiv = document.getElementById('story-output');
            const targetInput = document.getElementById('target-input').value;
            
            outputDiv.innerHTML = formatStory(currentRawStory, targetInput);
            applyStyles();
        }

        function processTextChunk(textSegment, targetWords, isTitle) {
            let isBoldCheckbox = document.getElementById('bold-words').checked;
            let isHighlight = document.getElementById('highlight-words').checked;
            let targetColorHex = document.getElementById('target-color').value;
            let fontChoice = document.getElementById('font-choice').value;
            let isDyslexicFont = fontChoice.includes('Dyslexic-Kriah');

            const getCol = (id) => document.getElementById(`en-${id}`).checked ? document.getElementById(`col-${id}`).value : '#000000';

            const tokens = textSegment.split(/([\s\n]+)/);
            let outputHtml = "";

            tokens.forEach(token => {
                if (/^[\s\n]+$/.test(token)) {
                    outputHtml += token.replace(/\n/g, '<br>'); 
                    return;
                }

                let pendingYudColor = null;
                let previousHadShva = false;
                let lastHebrewIndex = -1; 

                let tokenWithoutNikkud = token.replace(/[\u0591-\u05C7]/g, '');
                let cleanToken = tokenWithoutNikkud.replace(/[.,?!:;"'()\-]/g, '');
                
                let isTarget = targetWords.some(target => {
                    return cleanToken === target || cleanToken === 'ה' + target || cleanToken === 'ב' + target;
                });

                let processedWord = token.replace(/([\u05D0-\u05EA])([\u0591-\u05C7]*)/g, (match, letter, marks, offset, fullText) => {
                    
                    let isFirstInWordSegment = false;
                    
                    if (lastHebrewIndex === -1) {
                        isFirstInWordSegment = true; 
                    } else {
                        let textBetween = fullText.substring(lastHebrewIndex + 1, offset);
                        if (/[-־]/.test(textBetween)) {
                            isFirstInWordSegment = true;
                        }
                    }

                    if (isFirstInWordSegment) { previousHadShva = false; }

                    let newMarks = marks; 
                    
                    if (/^[אגדזחטילמנסעצקרתש]$/.test(letter)) {
                        newMarks = newMarks.replace(/\u05BC/g, '');
                    }

                    let hasDagesh = newMarks.includes('\u05BC');
                    let currentOutline = '';

                    if (letter === 'י' && pendingYudColor) {
                        currentOutline = `text-shadow: -1px -1px 0 ${pendingYudColor}, 1px -1px 0 ${pendingYudColor}, -1px 1px 0 ${pendingYudColor}, 1px 1px 0 ${pendingYudColor};`;
                        pendingYudColor = null; 
                    } else {
                        pendingYudColor = null; 
                    }

                    let vowelRegex = /[\u05B0-\u05BB\u05C7]/; 
                    let vowelMatch = newMarks.match(vowelRegex);
                    let vowel = '';
                    let color = '#000000';
                    let isShuruk = false; 
                    let currentHasShva = false; 

                    if (vowelMatch) {
                        vowel = vowelMatch[0];
                        if (vowel === '\u05B8') color = getCol('kamatz');
                        else if (vowel === '\u05B3') color = getCol('kamatz'); 
                        else if (vowel === '\u05C7') color = getCol('kamatz-katan'); 
                        else if (vowel === '\u05B7') color = getCol('patach');
                        else if (vowel === '\u05B2') color = getCol('patach'); 
                        else if (vowel === '\u05B6') color = getCol('segol');
                        else if (vowel === '\u05B1') color = getCol('segol'); 
                        else if (vowel === '\u05B4') color = getCol('chirik');
                        else if (vowel === '\u05B9') color = getCol('cholam');
                        else if (vowel === '\u05BB') color = getCol('kubutz');
                        else if (vowel === '\u05B5') {
                            let nextChar = fullText[offset + match.length];
                            if (nextChar === 'י') {
                                color = getCol('tzere-maleh');
                                if (document.getElementById('en-tzere-maleh').checked) { pendingYudColor = color; }
                            } else {
                                color = getCol('tzere-chaser');
                            }
                        }
                        else if (vowel === '\u05B0') {
                            currentHasShva = true;
                            if (isFirstInWordSegment) color = getCol('shva-na');
                            else if (previousHadShva) color = getCol('shva-na'); 
                            else color = getCol('shva-nach'); 
                        }
                    } else if (letter === 'ו' && hasDagesh) {
                        vowel = '\u05BC';
                        color = getCol('shuruk');
                        isShuruk = true;
                        if (document.getElementById('en-shuruk').checked) {
                            currentOutline = `text-shadow: 0px -1px 0 ${color}, 1px -1px 0 ${color}, 1px 0px 0 ${color}, 1px 1px 0 ${color}, 0px 1px 0 ${color};`;
                        }
                    }

                    lastHebrewIndex = offset;
                    previousHadShva = currentHasShva;

                    let structuralDots = (newMarks.match(/[\u05BC\u05C1\u05C2]/g) || []).join('');
                    if (isShuruk) { structuralDots = structuralDots.replace('\u05BC', ''); }

                    let letterWeight = 'normal';
                    let extraStyle = '';
                    
                    if (isTarget) {
                        if (isDyslexicFont) {
                            extraStyle = `font-size: calc(1em + 15px);`; 
                            letterWeight = 'normal'; 
                        } else if (isBoldCheckbox) {
                            letterWeight = 'bold'; 
                        }
                    }

                    let defaultTopColor = isTitle ? 'white' : 'black';
                    let topColor = (isTarget && isHighlight) ? targetColorHex : defaultTopColor;
                    let topSpanStyle = `color: ${topColor};`;
                    
                    if (currentOutline) { topSpanStyle += ` ${currentOutline}`; }

                    if (!color || color === '#000000') {
                        return `<span class="heb-cluster" style="font-weight: ${letterWeight}; ${extraStyle}"><span class="layer-top" style="${topSpanStyle}">${letter}${newMarks}</span></span>`;
                    }
                    
                    return `<span class="heb-cluster" style="font-weight: ${letterWeight}; ${extraStyle}">
                                <span class="layer-bottom" style="color: ${color};">${letter}${newMarks}</span>
                                <span class="layer-top" style="${topSpanStyle}">${letter}${structuralDots}</span>
                            </span>`;
                });

                outputHtml += `<span class="heb-word">${processedWord}</span>`;
            });
            return outputHtml;
        }

        function formatStory(text, targetInput) {
            const targetWords = targetInput.split(/[\n\t,]+/)
                .map(w => w.replace(/[\u0591-\u05C7]/g, '').trim())
                .filter(w => w.length > 0);

            let lines = text.split('\n').filter(l => l.trim().length > 0);
            let titleRaw = lines.length > 0 ? lines[0] : "סיפור";
            let bodyRaw = lines.length > 1 ? lines.slice(1).join('\n') : "";

            let showLineNumbers = document.getElementById('show-line-numbers').checked;
            let dynamicPadding = showLineNumbers ? "padding-right: 60px;" : "";

            let finalOutput = "";

            finalOutput += `<div class="story-title" style="background-color: black; padding: 15px; margin-bottom: 25px; border-radius: 8px; font-size: calc(1em + 15px); text-align: center; color: white;">`;
            finalOutput += processTextChunk(titleRaw, targetWords, true);
            finalOutput += `</div>`;

            // Apply dynamic padding instantly so the text renders perfectly on the first pass
            finalOutput += `<div class="story-body" dir="rtl" style="position: relative; line-height: 2.5; text-align: right; ${dynamicPadding}">`;
            finalOutput += processTextChunk(bodyRaw, targetWords, false);
            finalOutput += `</div>`;

            finalOutput += `<div class="penina-footer">Generated with Penina 2.6.2<br><em>&copy; 2026 David Israel</em></div>`;

            return finalOutput;
        }

        function updateLineNumbers() {
            document.querySelectorAll('.line-number').forEach(e => e.remove());
            
            const bodyDiv = document.querySelector('.story-body');
            if (!bodyDiv) return;

            let showLineNumbers = document.getElementById('show-line-numbers').checked;
            
            // Toggle padding dynamically for numbers
            if (!showLineNumbers) {
                if (bodyDiv.style.paddingRight !== '0px' && bodyDiv.style.paddingRight !== '') {
                    bodyDiv.style.paddingRight = '0px';
                }
                return; 
            }

            if (bodyDiv.style.paddingRight !== '60px') {
                bodyDiv.style.paddingRight = '60px';
            }

            const words = bodyDiv.querySelectorAll('.heb-word');
            
            let currentY = -9999; 
            let lineCount = 1;
            
            let baseFontSize = parseInt(document.getElementById('font-size').value);
            // Slightly tighter threshold ensures words with tall nikkud are still caught as the same line
            let wrapThreshold = baseFontSize * 0.8; 

            words.forEach(word => {
                let top = word.offsetTop;
                
                if (top > currentY + wrapThreshold) {
                    currentY = top;
                    
                    let numLabel = document.createElement('div');
                    numLabel.className = 'line-number';
                    numLabel.innerText = lineCount++;
                    
                    numLabel.style.position = 'absolute';
                    // Numbers now safely sit inside the 60px reserved padding boundary, safe from print cropping
                    numLabel.style.right = '10px'; 
                    numLabel.style.top = top + 'px'; 
                    numLabel.style.height = word.offsetHeight + 'px'; 
                    numLabel.style.display = 'flex';
                    numLabel.style.alignItems = 'center'; 
                    numLabel.style.justifyContent = 'center';
                    numLabel.style.fontSize = Math.max(14, baseFontSize * 0.45) + 'px'; 
                    numLabel.style.color = '#888';
                    numLabel.style.fontFamily = 'Arial, sans-serif';
                    numLabel.style.direction = 'ltr';
                    numLabel.style.width = '40px'; 
                    
                    bodyDiv.appendChild(numLabel);
                }
            });
        }

        function applyStyles() {
            const outputDiv = document.getElementById('story-output');
            const font = document.getElementById('font-choice').value;
            const margin = document.getElementById('margin-choice').value;
            const fontSize = document.getElementById('font-size').value;
            const kerning = document.getElementById('kerning').value;

            outputDiv.style.fontFamily = font;
            outputDiv.style.fontSize = fontSize + 'px';
            outputDiv.style.letterSpacing = kerning + 'px';

            if (margin === 'right' || margin === 'alternate-right' || margin === 'alternate-left') {
                outputDiv.style.padding = '0.75in 1.25in 0.75in 0.75in';
            } else if (margin === 'left') {
                outputDiv.style.padding = '0.75in 0.75in 0.75in 1.25in';
            } else {
                outputDiv.style.padding = '0.75in';
            }

            let styleTag = document.getElementById('dynamic-print-style');
            if (!styleTag) {
                styleTag = document.createElement('style');
                styleTag.id = 'dynamic-print-style';
                document.head.appendChild(styleTag);
            }

            // Excluded page numbers from kerning cascade as well
            let pageNumCSS = '@bottom-center { content: counter(page); font-size: 10pt; letter-spacing: normal; }';

            let css = `@media print { @page { size: letter; margin: 0.75in; ${pageNumCSS} } }`; 
            if (margin === 'right') css = `@media print { @page { size: letter; margin: 0.75in 1.25in 0.75in 0.75in; ${pageNumCSS} } }`;
            if (margin === 'left') css = `@media print { @page { size: letter; margin: 0.75in 0.75in 0.75in 1.25in; ${pageNumCSS} } }`;
            if (margin === 'alternate-right') css = `@media print { @page:right { margin: 0.75in 1.25in 0.75in 0.75in; ${pageNumCSS} } @page:left { margin: 0.75in 0.75in 0.75in 1.25in; ${pageNumCSS} } }`;
            if (margin === 'alternate-left') css = `@media print { @page:left { margin: 0.75in 1.25in 0.75in 0.75in; ${pageNumCSS} } @page:right { margin: 0.75in 0.75in 0.75in 1.25in; ${pageNumCSS} } }`;
            
            styleTag.innerHTML = css;

            // Increased timeout to guarantee completely accurate repaints before the offset math runs
            setTimeout(updateLineNumbers, 150);
        }
    </script>
