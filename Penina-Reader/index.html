<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Penina 3.1</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <style>
        @font-face {
            font-family: 'Dyslexic-Kriah';
            src: url('Dyslexic-Kriah.otf') format('opentype');
            font-weight: normal;
            font-style: normal;
        }

        body { font-family: Arial, sans-serif; padding: 20px 0; margin: 0; background-color: #f0f4f8; }
        .control-panel-wrapper { max-width: 900px; margin: 0 auto; padding: 0 20px; }
        .copyright { text-align: center; font-style: italic; font-size: 14px; color: #555; margin-bottom: 25px; }
        .header-container { display: flex; justify-content: center; align-items: center; margin-bottom: 0px; }
        .app-logo { width: 250px; height: auto; cursor: pointer; transition: transform 0.2s; }
        .app-logo:hover { transform: scale(1.02); }

        .credits-container {
            background: white; border: 1px solid #ccc; border-radius: 8px; padding: 15px;
            margin-bottom: 20px; font-size: 0.9em; line-height: 1.4; display: none;
        }

        .tab-container { display: flex; gap: 10px; }
        .tab { padding: 10px 20px; cursor: pointer; background: #ddd; border-radius: 8px 8px 0 0; font-weight: bold; }
        .tab.active { background: #fff; border: 1px solid #ccc; border-bottom: none; color: #007bff; }

        .panel { background: #fff; padding: 20px; border: 1px solid #ccc; border-radius: 0 8px 8px 8px; display: none; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .panel.active { display: block; }

        label { display: block; margin-top: 15px; font-weight: bold; color: #444; }
        textarea, input[type="text"], select { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; font-size: 16px; }
        textarea { resize: vertical; min-height: 80px; }

        button { padding: 12px 30px; font-size: 18px; cursor: pointer; background: #007bff; color: #fff; border: none; border-radius: 8px; }
        button:disabled { background: #aaa; cursor: not-allowed; }

        #output { 
            background: white; min-height: 10.5in; width: 8.5in; margin: 40px auto; 
            padding: 0.75in; box-shadow: 0 0 15px rgba(0,0,0,0.1); box-sizing: border-box;
            direction: rtl; line-height: 1.8; position: relative; color: #000;
        }

        .hebrew-text { font-size: 24pt; white-space: pre-wrap; word-wrap: break-word; }
        .v-pathach, .v-qamatz, .v-chataf-pathach { color: #0000FF; }
        .v-segol, .v-tzere, .v-chataf-segol { color: #FF0000; }
        .v-shva { color: #FFA500; }
        .v-cholam, .v-cholam-chaser { color: #008000; }
        .v-kubutz, .v-shuruk { color: #800080; }
        .v-chiriq { color: #FF00FF; }

        .line-wrapper { display: flex; align-items: flex-start; margin-bottom: 5px; }
        .line-number { width: 30px; text-align: left; font-size: 12pt; color: #888; margin-right: 15px; padding-top: 10px; font-family: Arial; }
        .line-content { flex: 1; }

        .settings-bar { display: flex; justify-content: space-between; background: #e9ecef; padding: 10px 20px; border-radius: 8px; margin-top: 20px; gap: 15px; }
        .setting-item { display: flex; align-items: center; gap: 10px; }

        @media print {
            .no-print { display: none !important; }
            #output { margin: 0; box-shadow: none; width: 100%; }
        }
    </style>
</head>
<body>

<div class="control-panel-wrapper no-print">
    <div class="header-container">
        <img src="penina-logo.png" alt="Penina Logo" class="app-logo" onclick="toggleCredits()">
    </div>
    
    <div id="credits-box" class="credits-container">
        <strong>Penina 3.1</strong><br>
        Vocalization: Dicta Engine 5.3<br>
        Generation: Google Gemini AI<br>
        <button onclick="toggleCredits()">Close</button>
    </div>

    <div class="tab-container">
        <div class="tab active" onclick="switchTab('pathway-a')">Create Story</div>
        <div class="tab" onclick="switchTab('pathway-b')">Vocalize Text</div>
    </div>

    <div id="pathway-a" class="panel active">
        <label>Theme (Hebrew/English):</label>
        <textarea id="theme" placeholder="e.g., A story about Jerusalem..."></textarea>
        <label>Include Targets:</label>
        <input type="text" id="target-input-a" placeholder="e.g., apple, dog">
        <label>Custom Instructions:</label>
        <textarea id="instructions" placeholder="e.g., Use simple sentences..."></textarea>
    </div>

    <div id="pathway-b" class="panel">
        <label>Paste Hebrew Text:</label>
        <textarea id="supplied-text" style="min-height: 150px;"></textarea>
        <label>Highlight Targets:</label>
        <input type="text" id="target-input-b">
    </div>

    <div class="settings-bar">
        <div class="setting-item">
            <label>Font:</label>
            <select id="font-choice" onchange="updateView()">
                <option value="Arial, sans-serif">Standard</option>
                <option value="'Dyslexic-Kriah', sans-serif">Dyslexic-Friendly</option>
            </select>
        </div>
        <div class="setting-item">
            <label>Size:</label>
            <select id="font-size" onchange="updateView()">
                <option value="18pt">18pt</option>
                <option value="24pt" selected>24pt</option>
                <option value="32pt">32pt</option>
            </select>
        </div>
    </div>

    <div style="text-align:center; margin-top:20px;">
        <button id="generate-btn" onclick="handleGenerate()">Generate & Vocalize</button>
        <button onclick="window.print()" style="background:#28a745; margin-left:10px;">Print PDF</button>
    </div>
</div>

<div id="output"><div id="text-content" class="hebrew-text">Ready...</div></div>

<script>
    function switchTab(id) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        event.target.classList.add('active');
        document.getElementById(id).classList.add('active');
    }

    function toggleCredits() {
        const box = document.getElementById('credits-box');
        box.style.display = (box.style.display === 'block') ? 'none' : 'block';
    }

    async function handleGenerate() {
        const btn = document.getElementById('generate-btn');
        const isA = document.getElementById('pathway-a').classList.contains('active');
        let theme = document.getElementById('theme').value.trim();
        let targets = isA ? document.getElementById('target-input-a').value.trim() : document.getElementById('target-input-b').value.trim();
        
        btn.disabled = true;
        btn.innerText = "Working...";

        try {
            // Translation Check
            if (/[a-zA-Z]/.test(theme) || /[a-zA-Z]/.test(targets)) {
                btn.innerText = "Translating...";
                if (/[a-zA-Z]/.test(theme)) {
                    const res = await fetch('/api/translate', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ promptText: `Translate to Hebrew: ${theme}` }) });
                    const d = await res.json(); theme = d.text;
                }
                if (/[a-zA-Z]/.test(targets)) {
                    const res = await fetch('/api/translate', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ promptText: `Translate words to Hebrew list: ${targets}` }) });
                    const d = await res.json(); targets = d.text;
                }
            }

            let resultText = "";
            if (isA) {
                const gen = await fetch('/api/generate', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ prompt: `Write a story in Hebrew. Theme: ${theme}. Include: ${targets}. No vowels.` }) });
                const genD = await gen.json();
                const voc = await fetch('/api/generate', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ suppliedText: genD.text }) });
                const vocD = await voc.json();
                resultText = vocD.text;
            } else {
                const voc = await fetch('/api/generate', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ suppliedText: document.getElementById('supplied-text').value }) });
                const vocD = await voc.json();
                resultText = vocD.text;
            }
            renderOutput(resultText, targets);
        } catch (e) {
            alert("Error: " + e.message);
        } finally {
            btn.disabled = false;
            btn.innerText = "Generate & Vocalize";
        }
    }

    function renderOutput(raw, targets) {
        const targetList = targets.split(',').map(s => s.trim().replace(/[\u0591-\u05C7]/g, ''));
        const out = document.getElementById('text-content');
        out.innerHTML = '';
        raw.split('\n').forEach((line, i) => {
            if (!line.trim()) return;
            const wrap = document.createElement('div'); wrap.className = 'line-wrapper';
            const num = document.createElement('div'); num.className = 'line-number'; num.innerText = i+1;
            const cont = document.createElement('div'); cont.className = 'line-content';
            line.split(/(\s+)/).forEach(word => {
                const span = document.createElement('span');
                if (targetList.includes(word.replace(/[\u0591-\u05C7]/g, ''))) span.style.fontWeight = 'bold';
                span.innerHTML = processVowels(word);
                cont.appendChild(span);
            });
            wrap.appendChild(num); wrap.appendChild(cont); out.appendChild(wrap);
        });
        updateView();
    }

    function processVowels(text) {
        return text.split('').map(c => {
            const code = c.charCodeAt(0);
            let cls = '';
            if (code === 0x05B7) cls = 'v-pathach';
            else if (code === 0x05B8) cls = 'v-qamatz';
            else if (code === 0x05B5) cls = 'v-tzere';
            else if (code === 0x05B6) cls = 'v-segol';
            else if (code === 0x05B1) cls = 'v-shva';
            else if (code === 0x05B9 || code === 0x05BA) cls = 'v-cholam';
            else if (code === 0x05BB || code === 0x05BC) cls = 'v-shuruk';
            else if (code === 0x05B4) cls = 'v-chiriq';
            return cls ? `<span class="${cls}">${c}</span>` : c;
        }).join('');
    }

    function updateView() {
        const out = document.getElementById('text-content');
        out.style.fontFamily = document.getElementById('font-choice').value;
        out.style.fontSize = document.getElementById('font-size').value;
    }
</script>
</body>
</html>
